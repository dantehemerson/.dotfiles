name: Test dotfiles (Ubuntu)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:latest

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap Ubuntu container
        run: |
          apt-get update
          apt-get install -y \
            ca-certificates \
            curl \
            git \
            sudo

      - name: Create non-root user
        run: |
          useradd -m -G sudo -s /bin/bash ci
          echo "ci ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Install dotfiles
        uses: ./.github/actions/dotfiles-install
        env:
          DEBIAN_FRONTEND: noninteractive
        with:
          run_as: 'ci'

      - name: Test dotfiles
        uses: ./.github/actions/dotfiles-test
        env:
          DEBIAN_FRONTEND: noninteractive
        with:
          run_as: 'ci'

      - name: Smoke Tests (Ubuntu-specific)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: su - ci -c 'command -v apt-get && command -v rust-fd-find'
